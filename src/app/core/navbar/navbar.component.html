<div class="container">
  <a class="navbar-brand" routerLink="/">Roll Away Your Stone</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="navbar-collapse collapse" id="navbarContent">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" routerLink="/songs" routerLinkActive="active">Songs</a>
      </li>
    </ul>
    <ul class="navbar-nav ms-auto">
      @if(user) {
        <li class="nav-item dropdown">
          <button class="nav-link dropdown-toggle" type="button" data-bs-toggle="dropdown">{{ user.email }}</button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <button class="dropdown-item" type="button" [disabled]="isSigningOut()" (click)="onSignOut()">Sign-out</button>
            </li>
          </ul>
        </li>
      }
      @else {
        <li class="nav-item">
          <a class="nav-link" routerLink="/sign-up" routerLinkActive="active">Sign-up</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/sign-in" routerLinkActive="active">Sign-in</a>
        </li>
      }
    </ul>
  </div>
</div>
