<div class="container">
  @if (songs.hasValue()) {
    <h3>Songs</h3>
    <div class="list-group mt-3">
      @for (song of songs.value(); track $index) {
        <a class="list-group-item list-group-item-action" [routerLink]="['/songs', song.id]">{{ song.title }}</a>
      }
    </div>
  }
  @else {
    <div class="text-center">
      <div class="spinner-border text-dark"></div>
    </div>
  }
</div>
