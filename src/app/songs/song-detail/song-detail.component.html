<div class="container">
  @if (song.hasValue()) {
    <h3>{{ song.value().title }}</h3>
    <div class="bg-body-secondary rounded mt-3 p-5 text-center">
      <p class="mb-0" [innerText]="song.value().lyrics"></p>
    </div>
  }
  @else {
    <div class="text-center">
      <div class="spinner-border text-dark"></div>
    </div>
  }
</div>
